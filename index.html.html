<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>管弦樂團家族分類</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@600;700&family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg-0:#ffffff;
    --bg-1:#ffffff;
    --card:#bbbbbb;
    --card-border:#424040;
    --ink:#000000;
    --ink-dim:#000000;
    --gold:#d4af6a;

    --string:#b5652d;
    --string-soft:#b5652d33;
    --wood:#4e8a5c;
    --wood-soft:#4e8a5c33;
    --brass:#c9a227;
    --brass-soft:#c9a22733;
    --perc:#a5333f;
    --perc-soft:#a5333f33;
  }

  *{box-sizing:border-box;}
  body{
    margin:0;
    min-height:100vh;
    background:
      radial-gradient(1200px 600px at 50% -10%, #262c42 0%, transparent 60%),
      linear-gradient(180deg, var(--bg-0), var(--bg-1));
    color:var(--ink);
    font-family:'Noto Sans TC', sans-serif;
    padding:32px 16px 60px;
  }

  .wrap{max-width:980px;margin:0 auto;}

  header{text-align:center;margin-bottom:28px;}
  .eyebrow{
    letter-spacing:.3em;
    font-size:11px;
    color:var(--gold);
    text-transform:uppercase;
    margin-bottom:10px;
  }
  h1{
    font-family:'Noto Serif TC', serif;
    font-size:clamp(24px,4vw,36px);
    margin:0 0 8px;
    font-weight:700;
  }
  .sub{color:var(--ink-dim);font-size:14px;max-width:520px;margin:0 auto;}

  .scoreboard{
    display:flex;
    justify-content:center;
    gap:24px;
    margin-top:18px;
    flex-wrap:wrap;
  }
  .pill{
    background:var(--card);
    border:1px solid var(--card-border);
    border-radius:999px;
    padding:8px 18px;
    font-size:13px;
    color:var(--ink-dim);
  }
  .pill b{color:var(--ink);font-size:15px;margin-left:4px;}

  .tray{
    margin:28px 0 32px;
    background:var(--card);
    border:1px solid var(--card-border);
    border-radius:16px;
    padding:18px;
    min-height:104px;
  }
  .tray-label{
    font-size:16px;
    color:var(--ink-dim);
    margin-bottom:12px;
    letter-spacing:.05em;
  }
  .tray-items{
    display:flex;
    flex-wrap:wrap;
    gap:12px;
    justify-content:center;
  }

  .chip{
    min-width:88px;
    background:#ffffff;
    border:2px solid transparent;
    border-radius:10px;
    padding:14px 16px;
    text-align:center;
    cursor:grab;
    user-select:none;
    position:relative;
    transition:transform .15s ease, border-color .15s ease, opacity .2s ease;
  }
  .chip:hover{transform:translateY(-3px);}
  .chip.selected{
    border-color:var(--gold);
    box-shadow:0 0 0 3px #d4af6a33;
  }
  .chip .name-zh{
    display:block;
    font-size:18px;
    font-weight:700;
    color:var(--ink);
    font-family:'Noto Serif TC', serif;
    line-height:1.3;
  }
  .chip .name-en{
    display:block;
    font: size 14px;px;
    color:var(--ink-dim);
    letter-spacing:.04em;
    margin-top:3px;
  }
  .chip.dragging{opacity:.35;}

  .reference-panel{
    background:var(--card);
    border:1px solid var(--card-border);
    border-radius:16px;
    padding:18px;
    margin-bottom:24px;
  }
  .ref-thumbs{
    display:flex;
    flex-wrap:wrap;
    gap:14px;
    justify-content:center;
  }
  .ref-thumb{
    width:130px;
    cursor:zoom-in;
    text-align:center;
    background:transparent;
    border:none;
    padding:0;
    font-family:inherit;
  }
  .ref-thumb img{
    width:100%;
    display:block;
    border-radius:10px;
    border:1px solid var(--card-border);
    background:#fff;
    transition:border-color .15s ease, transform .15s ease;
  }
  .ref-thumb:hover img{border-color:var(--gold);transform:translateY(-2px);}
  .ref-thumb span{
    display:block;
    margin-top:6px;
    font-size:12px;
    color:var(--ink-dim);
  }

  .lightbox{
    display:none;
    position:fixed;
    inset:0;
    background:rgba(10,11,16,.86);
    z-index:50;
    align-items:center;
    justify-content:center;
    padding:28px;
  }
  .lightbox.show{display:flex;}
  .lightbox-inner{
    position:relative;
    max-width:min(92vw,640px);
    max-height:90vh;
  }
  .lightbox-inner img{
    max-width:100%;
    max-height:90vh;
    display:block;
    border-radius:12px;
    background:#ffffff;
  }
  .lightbox-close{
    position:absolute;
    top:-16px;
    right:-16px;
    width:34px;
    height:34px;
    border-radius:50%;
    background:var(--gold);
    color:var(--bg-0);
    border:none;
    font-size:16px;
    cursor:pointer;
  }

  .grid{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:16px;
  }
  @media (max-width:600px){
    .grid{grid-template-columns:1fr;}
  }

  .zone{
    position:relative;
    background:var(--card);
    border:1px solid var(--card-border);
    border-radius:16px;
    padding:16px 16px 14px;
    min-height:150px;
    transition:box-shadow .15s ease, transform .1s ease;
  }
  .zone::before{
    content:"";
    position:absolute;
    top:0;left:16px;right:16px;
    height:3px;
    border-radius:0 0 4px 4px;
    background:var(--zone-color);
  }
  .zone-head{
    display:flex;
    align-items:baseline;
    justify-content:space-between;
    margin-bottom:10px;
  }
  .zone-title{
    font-family:'Noto Serif TC', serif;
    font-weight:700;
    font: size 18px;px;
  }
  .zone-title small{
    display:block;
    font-family:'Noto Sans TC', sans-serif;
    font-weight:400;
    font: size 18px;px;
    color:var(--ink-dim);
    letter-spacing:.08em;
    margin-top:2px;
  }
  .zone-count{
    font-size:12px;
    color:var(--zone-color);
    font-weight:700;
  }

  .zone.over{
    box-shadow:0 0 0 2px var(--zone-color);
  }
  .zone.wrong{
    animation:shake .4s ease;
    box-shadow:0 0 0 2px var(--perc);
  }
  @keyframes shake{
    10%,90%{transform:translateX(-2px);}
    20%,80%{transform:translateX(4px);}
    30%,50%,70%{transform:translateX(-6px);}
    40%,60%{transform:translateX(6px);}
  }

  .zone-items{
    display:flex;
    flex-wrap:wrap;
    gap:8px;
  }
  .placed{
    min-width:78px;
    background:#ffffff;
    border-radius:8px;
    padding:10px 12px;
    text-align:center;
    position:relative;
    animation:pop .25s ease;
  }

  .info-link{
    position:absolute;
    top:-6px;
    right:-6px;
    width:18px;
    height:18px;
    border-radius:50%;
    background:var(--bg-1);
    border:1px solid var(--gold);
    color:var(--gold);
    font-size:10px;
    line-height:16px;
    text-align:center;
    text-decoration:none;
    z-index:2;
  }
  .info-link:hover{background:var(--gold);color:var(--bg-0);}
  .placed .info-link{width:15px;height:15px;font-size:9px;line-height:13px;top:-5px;right:-5px;}
  .placed .name-zh{
    display:block;
    font-size:15px;
    font-weight:700;
    color:var(--ink);
    font-family:'Noto Serif TC', serif;
    line-height:1.3;
  }
  .placed .name-en{
    display:block;
    font: size 12px;px;
    color:var(--ink-dim);
    letter-spacing:.03em;
    margin-top:2px;
  }
  @keyframes pop{
    0%{transform:scale(.6);opacity:0;}
    70%{transform:scale(1.08);opacity:1;}
    100%{transform:scale(1);}
  }

  #zone-string{--zone-color:var(--string);}
  #zone-woodwind{--zone-color:var(--wood);}
  #zone-brass{--zone-color:var(--brass);}
  #zone-percussion{--zone-color:var(--perc);}

  .footer-row{
    display:flex;
    justify-content:center;
    align-items:center;
    gap:14px;
    margin-top:26px;
    flex-wrap:wrap;
  }
  .hint{
    min-height:20px;
    text-align:center;
    font-size:13px;
    color:var(--gold);
  }
  button{
    background:transparent;
    border:1px solid var(--card-border);
    color:var(--ink-dim);
    padding:9px 20px;
    border-radius:999px;
    font: size 16px;px;
    cursor:pointer;
    font-family:inherit;
    transition:border-color .15s ease, color .15s ease;
  }
  button:hover{border-color:var(--gold);color:var(--ink);}
  button:focus-visible, .chip:focus-visible, .zone:focus-visible{
    outline:2px solid var(--gold);
    outline-offset:2px;
  }

  .win-banner{
    display:none;
    text-align:center;
    margin-top:24px;
    padding:20px;
    border-radius:16px;
    background:linear-gradient(135deg,#2c3149,#232739);
    border:1px solid var(--gold);
  }
  .win-banner.show{display:block;}
  .win-banner h2{
    font-family:'Noto Serif TC',serif;
    color:var(--gold);
    margin:0 0 6px;
    font-size:20px;
  }
  .win-banner p{margin:0;color:var(--ink-dim);font-size:13px;}
</style>
</head>
<body>
<div class="wrap">

  <header>
    <div class="eyebrow">Carnegie Hall · Orchestra Map</div>
    <h1>管弦樂團家族分類</h1>
    <span class="sub">把每一件樂器拖曳（或點選後點目標區）到正確的家族裡：弦樂器、木管樂器、銅管樂器、打擊樂器。</p>
    <div class="scoreboard">
    <div class="pill">已完成 <b id="score-correct">0</b> / <span id="score-total">15</span></div>
    <div class="pill">嘗試次數 <b id="score-attempts">0</b></div>
    <button id="reset-btn" style="margin-left: 10px;">重新開始</button>
  </div>
</header>
  <div class="grid">
    <div class="zone" id="zone-string" data-family="string" tabindex="0">
      <div class="zone-head">
        <div class="zone-title">弦樂器<small>STRING FAMILY</small></div>
        <div class="zone-count"><span class="c">0</span>/5</div>
      </div>
      <div class="zone-items"></div>
    </div>

    <div class="zone" id="zone-woodwind" data-family="woodwind" tabindex="0">
      <div class="zone-head">
        <div class="zone-title">木管樂器<small>WOODWIND FAMILY</small></div>
        <div class="zone-count"><span class="c">0</span>/4</div>
      </div>
      <div class="zone-items"></div>
    </div>

    <div class="zone" id="zone-brass" data-family="brass" tabindex="0">
      <div class="zone-head">
        <div class="zone-title">銅管樂器<small>BRASS FAMILY</small></div>
        <div class="zone-count"><span class="c">0</span>/4</div>
      </div>
      <div class="zone-items"></div>
    </div>

    <div class="zone" id="zone-percussion" data-family="percussion" tabindex="0">
      <div class="zone-head">
        <div class="zone-title">打擊樂器<small>PERCUSSION FAMILY</small></div>
        <div class="zone-count"><span class="c">0</span>/2</div>
      </div>
      <div class="zone-items"></div>
    </div>
  </div>


  <div class="hint" id="hint"></div>

  <div class="win-banner" id="win-banner">
    <h2>太棒了！全部分類完成 🎻</h2>
    <p id="win-detail"></p>
  </div>

</div>

<div class="lightbox" id="lightbox">
  <div class="lightbox-inner">
    <button class="lightbox-close" id="lightbox-close" aria-label="關閉">✕</button>
    <img id="lightbox-img" src="" alt="">
  </div>
</div>

  <div class="tray">
    <div class="tray-label">樂器區·拖曳或先點選樂器，再點選右下方的家族</div>
    <div class="tray-items" id="tray"></div>
  </div>

  <div class="reference-panel">
    <div class="tray-label">參考圖·點圖片可放大檢視</div>
    <div class="ref-thumbs" id="ref-thumbs"></div>
  </div>

  {id:"harp", name:"豎琴", en:"Harp", family:"string", link:OM+"harp"},

  {id:"flute", name:"長笛", en:"Flute", family:"woodwind", link:OM+"flute"},
  {id:"oboe", name:"雙簧管", en:"Oboe", family:"woodwind", link:OM+"oboe"},
  {id:"clarinet", name:"單簧管", en:"Clarinet", family:"woodwind", link:OM+"clarinet"},
  {id:"bassoon", name:"低音管", en:"Bassoon", family:"woodwind", link:OM+"bassoon"},

  {id:"french-horn", name:"法國號", en:"French Horn", family:"brass", link:OM+"french_horn"},
  {id:"tuba", name:"低音號", en:"Tuba", family:"brass", link:OM+"tuba"},
  {id:"trumpet", name:"小號", en:"Trumpet", family:"brass", link:OM+"trumpet"},
  {id:"trombone", name:"長號", en:"Trombone", family:"brass", link:OM+"trombone"},

  {id:"unpitched-percussion", name:"無定音打擊樂器", en:"unpitched percussion ", family:"percussion", link:OM+"unpitched_percussion"},
  {id:"pitched-percussion", name:"定音打擊樂器", en:"pitched percussion ", family:"percussion", link:OM+"pitched_percussion"},
];

window.openInfo = function(e, url){
  e.stopPropagation();
  e.preventDefault();
  window.open(url, '_blank', 'noopener,noreferrer');
  return false;
};

function linkHtml(item){
  return `<a class="info-link" href="${item.link}" target="_blank" rel="noopener noreferrer" title="到 Orchestra Map 認識${item.name}" onclick="return openInfo(event,'${item.link}')">i</a>`;
}

let pool = [];
let selectedId = null;
let correctCount = 0;
let attempts = 0;

const tray = document.getElementById('tray');
const hint = document.getElementById('hint');
const zones = Array.from(document.querySelectorAll('.zone'));
const scoreCorrectEl = document.getElementById('score-correct');
const scoreAttemptsEl = document.getElementById('score-attempts');
const winBanner = document.getElementById('win-banner');
const winDetail = document.getElementById('win-detail');

function shuffle(arr){
  const a = [...arr];
  for(let i=a.length-1;i>0;i--){
    const j = Math.floor(Math.random()*(i+1));
    [a[i],a[j]] = [a[j],a[i]];
  }
  return a;
}

function init(){
  pool = shuffle(INSTRUMENTS);
  correctCount = 0;
  attempts = 0;
  selectedId = null;
  winBanner.classList.remove('show');
  hint.textContent = '';
  zones.forEach(z=>{
    z.querySelector('.zone-items').innerHTML = '';
    z.querySelector('.zone-count .c').textContent = '0';
  });
  renderTray();
  updateScoreboard();
}

function renderTray(){
  tray.innerHTML = '';
  pool.forEach(item=>{
    const chip = document.createElement('div');
    chip.className = 'chip';
    chip.draggable = true;
    chip.dataset.id = item.id;
    chip.tabIndex = 0;
    chip.innerHTML = `${linkHtml(item)}<span class="name-zh">${item.name}</span><span class="name-en">${item.en}</span>`;

    chip.addEventListener('dragstart', e=>{
      e.dataTransfer.setData('text/plain', item.id);
      chip.classList.add('dragging');
    });
    chip.addEventListener('dragend', ()=> chip.classList.remove('dragging'));

    chip.addEventListener('click', ()=>{
      if(selectedId === item.id){
        selectedId = null;
        chip.classList.remove('selected');
        hint.textContent = '';
        return;
      }
      document.querySelectorAll('.chip.selected').forEach(c=>c.classList.remove('selected'));
      selectedId = item.id;
      chip.classList.add('selected');
      hint.textContent = `已選取「${item.name}」，點右下方任一個家族方框試試看`;
    });

    tray.appendChild(chip);
  });
}

function attemptPlace(instrumentId, zoneEl){
  const item = INSTRUMENTS.find(i=>i.id===instrumentId);
  if(!item) return;
  attempts++;

  if(item.family === zoneEl.dataset.family){
    // correct
    pool = pool.filter(i=>i.id!==instrumentId);
    renderTray();
    const holder = document.createElement('div');
    holder.className = 'placed';
    holder.innerHTML = `${linkHtml(item)}<span class="name-zh">${item.name}</span><span class="name-en">${item.en}</span>`;
    zoneEl.querySelector('.zone-items').appendChild(holder);
    correctCount++;
    const countEl = zoneEl.querySelector('.zone-count .c');
    countEl.textContent = Number(countEl.textContent)+1;
    hint.textContent = `答對了！${item.name}屬於${zoneEl.querySelector('.zone-title').firstChild.textContent}`;
    selectedId = null;

    if(pool.length === 0){
      winDetail.textContent = `一共嘗試了 ${attempts} 次，答對 ${correctCount} 題。`;
      winBanner.classList.add('show');
    }
  } else {
    zoneEl.classList.add('wrong');
    hint.textContent = `不對喔，「${item.name}」不屬於這一區，再想想看！`;
    setTimeout(()=> zoneEl.classList.remove('wrong'), 400);
  }
  updateScoreboard();
}

zones.forEach(zone=>{
  zone.addEventListener('dragover', e=>{
    e.preventDefault();
    zone.classList.add('over');
  });
  zone.addEventListener('dragleave', ()=> zone.classList.remove('over'));
  zone.addEventListener('drop', e=>{
    e.preventDefault();
    zone.classList.remove('over');
    const id = e.dataTransfer.getData('text/plain');
    if(id) attemptPlace(id, zone);
  });
  zone.addEventListener('click', ()=>{
    if(selectedId) attemptPlace(selectedId, zone);
  });
  zone.addEventListener('keydown', e=>{
    if((e.key==='Enter' || e.key===' ') && selectedId){
      e.preventDefault();
      attemptPlace(selectedId, zone);
    }
  });
});

function updateScoreboard(){
  scoreCorrectEl.textContent = correctCount;
  scoreAttemptsEl.textContent = attempts;
}

document.getElementById('reset-btn').addEventListener('click', init);


const refThumbs = document.getElementById('ref-thumbs');
REFERENCE_SHEETS.forEach(sheet=>{
  const el = document.createElement('button');
  el.className = 'ref-thumb';
  el.type = 'button';
  el.innerHTML = `<img src="${sheet.thumb}" alt="${sheet.label}參考圖，點擊放大"><span>${sheet.label}</span>`;
  el.addEventListener('click', ()=> openLightbox(sheet));
  refThumbs.appendChild(el);
});

function openLightbox(sheet){
  const img = document.getElementById('lightbox-img');
  img.src = sheet.full;
  img.alt = sheet.label + ' 參考圖';
  document.getElementById('lightbox').classList.add('show');
}
function closeLightbox(){
  document.getElementById('lightbox').classList.remove('show');
  document.getElementById('lightbox-img').src = '';
}
document.getElementById('lightbox-close').addEventListener('click', closeLightbox);
document.getElementById('lightbox').addEventListener('click', e=>{
  if(e.target.id === 'lightbox') closeLightbox();
});
document.addEventListener('keydown', e=>{
  if(e.key === 'Escape') closeLightbox();
});

init();
</script>
</body>
</html>
